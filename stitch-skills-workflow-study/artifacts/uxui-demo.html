<!doctype html><html><head><meta charset='utf-8'><title>UXUI Demo</title><style>body{font-family:system-ui;padding:24px}.step{padding:12px;border:1px solid #ddd;border-radius:8px;margin-bottom:8px}.active{border-color:#2563eb;background:#eff6ff}button{padding:8px 12px}</style></head><body><h1>Vulnerability Reporting UX Flow</h1><div id='s1' class='step active'>1) Submit report</div><div id='s2' class='step'>2) Risk scoring</div><div id='s3' class='step'>3) SLA commitment</div><button onclick='next()'>Next</button><script>let i=1;function next(){i=i%3+1;for(let n=1;n<=3;n++)document.getElementById('s'+n).classList.remove('active');document.getElementById('s'+i).classList.add('active')}</script></body></html>
