<!doctype html><html><head><meta charset='utf-8'><title>Emotion Animation</title><style>body{font-family:Arial;padding:30px}.row{display:flex;gap:30px}.dot{width:70px;height:70px;border-radius:50%}.pulse{background:#ef4444;animation:p 1.2s infinite}.wave{background:#3b82f6;animation:w 1.6s infinite}.burst{background:#22c55e;animation:b 1s infinite}@keyframes p{0%{transform:scale(1);opacity:1}50%{transform:scale(1.2);opacity:.5}100%{transform:scale(1);opacity:1}}@keyframes w{0%{transform:translateY(0)}50%{transform:translateY(-12px)}100%{transform:translateY(0)}}@keyframes b{0%{box-shadow:0 0 0 0 rgba(34,197,94,.6)}100%{box-shadow:0 0 0 25px rgba(34,197,94,0)}}</style></head><body><h1>Emotion Animation Demo</h1><div class='row'><div><div class='dot pulse'></div><p>Urgency</p></div><div><div class='dot wave'></div><p>Flow</p></div><div><div class='dot burst'></div><p>Success</p></div></div></body></html>
